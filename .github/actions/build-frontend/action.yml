name: Build frontend
description: Install frontend dependencies, build the production bundle, and upload dist.
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node
      name: Install node
    - name: Build dependencies
      shell: bash
      run: npm ci
    - name: Build production bundle
      shell: bash
      env:
        CI: true
      run: npm run build
    - uses: actions/upload-artifact@master
      name: Upload website content
      with:
        name: website-dist
        path: dist
