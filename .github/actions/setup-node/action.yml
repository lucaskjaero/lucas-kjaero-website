name: Set up Node.js
description: Install the Node.js and npm versions used by all workflows.
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '25.x'
    - name: Install npm
      shell: bash
      run: npm install -g npm@11.11.0
    - name: Show versions
      shell: bash
      run: |
        node --version
        npm --version
