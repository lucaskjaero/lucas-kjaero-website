name: Check links
description: Install link checker dependencies and validate site links.
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: 3.13.2
    - name: Install dependencies
      shell: bash
      run: pip install -r requirements.txt
    - name: Check links
      shell: bash
      run: python link_checker.py
