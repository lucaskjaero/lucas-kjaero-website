name: PR Check - Resume

on: 
  pull_request:
    paths:
      - "resume/*"

jobs:
  build-resume:
    name: Test that resumes build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@master
    - name: Install latex and fonts
      run: sudo apt-get install texlive-xetex fonts-arphic-gbsn00lp fonts-wqy-zenhei fonts-arphic-gkai00mp latex-cjk-all
    - name: Compile English resume
      run: xelatex -file-line-error -interaction=nonstopmode -recorder lucas-kjaero-zhang-resume.tex
      working-directory: resume
    - name: Compile Chinese resume
      run: xelatex -file-line-error -interaction=nonstopmode -recorder lucas-kjaero-zhang-个人简历.tex
      working-directory: resume
    - uses: actions/upload-artifact@v6
      name: Upload resume previews
      with:
        name: resume-previews
        path: |
          resume/lucas-kjaero-zhang-resume.pdf
          resume/lucas-kjaero-zhang-个人简历.pdf
        if-no-files-found: error
    - name: Comment with resume preview link
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        ARTIFACTS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
      run: gh pr comment "$PR_URL" --edit-last --create-if-none --body "Resume preview PDFs are available in the [resume-previews artifact]($ARTIFACTS_URL)."
