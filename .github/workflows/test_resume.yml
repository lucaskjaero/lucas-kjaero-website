name: PR Check - Resume

on: 
  pull_request:
    paths:
      - "resume/*"

jobs:
  build-resume:
    name: Test that resumes build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: Compile resumes
      uses: xu-cheng/latex-action@v4
      with:
        working_directory: resume
        root_file: |
          lucas-kjaero-zhang-resume.tex
          lucas-kjaero-zhang-个人简历.tex
        latexmk_use_xelatex: true
        os: alpine
        extra_system_packages: font-wqy-zenhei font-noto-cjk
    - uses: actions/upload-artifact@v6
      name: Upload resume previews
      with:
        name: resume-previews
        path: |
          resume/lucas-kjaero-zhang-resume.pdf
          resume/lucas-kjaero-zhang-个人简历.pdf
        if-no-files-found: error
